<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <title>Skate System</title>
    <meta name="description" content="A read-only dashboard for my skateboarding system — trick map, wisdom, assessment, sessions, spots." />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%B9%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <header class="topbar">
      <button id="menuBtn" class="menu-btn" aria-label="Toggle navigation" aria-controls="sidebar" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <a href="#overview" class="brand">🛹 <span>Skate System</span></a>
      <div class="topbar-spacer"></div>
    </header>

    <div class="layout">
      <aside id="sidebar" class="sidebar" aria-label="Sections">
        <div class="search-wrap">
          <input id="search" type="search" placeholder="Search…" autocomplete="off" aria-label="Search sections" />
        </div>
        <nav id="nav" class="nav"></nav>
        <p class="nav-foot" id="navFoot"></p>
      </aside>
      <div id="scrim" class="scrim" hidden></div>

      <main id="main" class="content" tabindex="-1">
        <div id="article" class="article"></div>
      </main>
    </div>

    <div id="lightbox" class="lightbox" hidden role="dialog" aria-modal="true" aria-label="Photo viewer">
      <button class="lightbox-close" aria-label="Close photo">×</button>
      <img id="lightboxImg" alt="" />
      <p id="lightboxTitle" class="lightbox-title" hidden></p>
      <p id="lightboxCap" class="lightbox-cap"></p>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
